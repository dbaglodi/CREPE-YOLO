seed: 42
run_name: test_dry_run
output_root: outputs

# Data configuration (same as base but for quick testing)
data:
  processed_dir: data/processed/itm_flute
  batch_size: 4
  num_workers: 0
  test_size: 0.2

# Model configuration
model:
  num_anchors: 3

# Optimizer configuration
optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Training configuration (MINIMAL for dry run)
train:
  epochs: 2                    # Just 2 epochs to test
  device: cuda
  grad_clip: 5.0
  save_every: 1               # Save after each epoch for inspection

# MLflow configuration
mlflow:
  tracking_uri: file:./mlruns
  experiment_name: CREPE-YOLO-Testing

# Evaluation configuration
eval:
  conf_threshold: 0.5
  nms_iou_threshold: 0.4
  onset_tolerance: 0.05
  offset_ratio: 0.20
  offset_min: 0.05
  pitch_tolerance: 0.5
