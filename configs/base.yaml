seed: 42
run_name: crepe_yolox_base_run_norm
output_root: outputs

# Data configuration
data:
  # Path to pre-computed features (from precompute_features.py)
  processed_dir: /home/spencerpkessler/scratch/data/processed/combined_data
  batch_size: 16
  num_workers: 4
  train_size: 0.64
  val_size: 0.16
  test_size: 0.20
  combine_val_to_train: true
  train_set_usage: 1.0

# Model configuration
model:
  # Switch between the anchor-based YOLO head and anchor-free YOLOX head.
  # Options: yolo, yolox
  architecture: yolox
  num_anchors: 3
  yolo:
    anchors:
      - [0.0026, 0.0139]
      - [0.0062, 0.0139]
      - [0.0153, 0.0139]
    lambda_coord: 5.0
    lambda_noobj: 0.5
  yolox:
    lambda_coord: 5.0
    lambda_noobj: 0.5
  model:
    num_anchors: 3
    use_raw_shape: true

# Optimizer configuration
optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Training configuration
train:
  epochs: 100
  device: cuda
  grad_clip: 3.0
  save_every: 5
  train_metrics_max_samples: 100

# MLflow configuration
mlflow:
  tracking_uri: file:./mlruns
  experiment_name: CREPE-YOLOX-Transcription

# Evaluation configuration (for evaluate.py)
eval:
  conf_threshold: 0.5
  nms_iou_threshold: 0.4
  onset_tolerance: 0.05
  offset_ratio: 0.20
  offset_min: 0.05
  pitch_tolerance: 0.5
