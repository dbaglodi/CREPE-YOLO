seed: 42
run_name: crepe_yolo_base_run
output_root: outputs

# Data configuration
data:
  # Path to pre-computed features (from precompute_features.py)
  processed_dir: data/processed/combined_data
  batch_size: 4
  num_workers: 0
  train_size: 0.64
  val_size: 0.16
  test_size: 0.20
  combine_val_to_train: false
  train_set_usage: 1.0

# Model configuration
model:
  num_anchors: 3

# Optimizer configuration
optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Training configuration
train:
  epochs: 300
  device: cuda
  grad_clip: 5.0
  save_every: 10
  train_metrics_max_samples: 32

# MLflow configuration
mlflow:
  tracking_uri: file:./mlruns
  experiment_name: CREPE-YOLO-Transcription

# Evaluation configuration (for evaluate.py)
eval:
  conf_threshold: 0.5
  nms_iou_threshold: 0.4
  onset_tolerance: 0.05
  offset_ratio: 0.20
  offset_min: 0.05
  pitch_tolerance: 0.5
